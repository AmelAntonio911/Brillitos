<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fideito ♡</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #1a0e2e 0%, #0a0612 60%, #050309 100%);
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }

  #bgCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: none;
  }

  .ui-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .title {
    font-size: clamp(28px, 6vw, 56px);
    font-weight: 300;
    letter-spacing: 4px;
    color: #fff;
    text-shadow:
      0 0 10px rgba(255, 200, 230, 0.8),
      0 0 25px rgba(220, 170, 255, 0.6),
      0 0 45px rgba(255, 255, 255, 0.4);
    opacity: 0;
    animation: fadeInTitle 2.2s ease forwards;
    margin-bottom: 40px;
    text-align: center;
    user-select: none;
  }

  @keyframes fadeInTitle {
    0% { opacity: 0; transform: translateY(-15px) scale(0.95); letter-spacing: 10px; }
    60% { opacity: 1; }
    100% { opacity: 1; transform: translateY(0) scale(1); letter-spacing: 4px; }
  }

  .btn-container {
    display: flex;
    gap: 20px;
    pointer-events: all;
  }

  .heart-btn {
    position: relative;
    padding: 16px 38px;
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.35);
    background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(230,180,255,0.10));
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font-size: 16px;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow:
      0 4px 30px rgba(200, 150, 255, 0.25),
      inset 0 0 20px rgba(255,255,255,0.08);
    transition: all 0.35s ease;
    opacity: 0;
    animation: fadeInBtn 1.5s ease 1.2s forwards;
    user-select: none;
  }

  .heart-btn:hover {
    background: linear-gradient(135deg, rgba(255,255,255,0.28), rgba(230,180,255,0.18));
    box-shadow:
      0 4px 40px rgba(220, 170, 255, 0.45),
      inset 0 0 25px rgba(255,255,255,0.15);
    transform: translateY(-2px) scale(1.04);
  }

  .heart-btn:active {
    transform: translateY(0) scale(0.97);
  }

  .heart-btn.active-state {
    background: linear-gradient(135deg, rgba(255,255,255,0.35), rgba(230,180,255,0.25));
    box-shadow: 
      0 4px 40px rgba(220, 170, 255, 0.6), 
      inset 0 0 25px rgba(255,255,255,0.3);
  }

  @keyframes fadeInBtn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hint {
    position: fixed;
    bottom: 24px;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeInBtn 1.5s ease 1.8s forwards;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="ui-layer">
  <div class="title">Amy Shell&nbsp; ♡</div>
  <div class="btn-container">
    <button class="heart-btn" id="heartBtn">✨ Magia ✨</button>
    <button class="heart-btn" id="toggleCursorBtn">✨ Guiar brillitos ✨</button>
  </div>
</div>

<div class="hint">mueve el cursor para guiar los brillitos · botón para un corazón de destellos</div>

<script>
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const palette = [
  { r: 255, g: 255, b: 255 },
  { r: 255, g: 195, b: 225 },
  { r: 255, g: 170, b: 210 },
  { r: 215, g: 175, b: 255 },
  { r: 190, g: 150, b: 255 },
];

function lerp(a, b, t) { return a + (b - a) * t; }

function randomColorPair() {
  const a = palette[Math.floor(Math.random() * palette.length)];
  let b = palette[Math.floor(Math.random() * palette.length)];
  return { from: a, to: b };
}

const mouse = { x: W / 2, y: H / 2, active: false, lastMove: 0 };
let cursorTrackingEnabled = false;

document.getElementById('toggleCursorBtn').addEventListener('click', () => {
  cursorTrackingEnabled = !cursorTrackingEnabled;
  document.getElementById('toggleCursorBtn').classList.toggle('active-state', cursorTrackingEnabled);
});

window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  mouse.lastMove = performance.now();
});
window.addEventListener('mouseleave', () => { mouse.active = false; });
window.addEventListener('touchmove', (e) => {
  if (e.touches[0]) {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
    mouse.active = true;
    mouse.lastMove = performance.now();
  }
}, { passive: true });
window.addEventListener('touchend', () => { mouse.active = false; });

const IDLE_TIMEOUT = 1200;

class Sparkle {
  constructor() {
    this.reset(true);
    this.colorState = randomColorPair();
    this.colorT = Math.random();
    this.colorSpeed = 0.002 + Math.random() * 0.004;
  }

  reset(initial = false) {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.baseSize = 0.6 + Math.random() * 2.2;
    this.size = this.baseSize;
    this.twinkleSpeed = 0.02 + Math.random() * 0.05;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.angle = Math.random() * Math.PI * 2;
    this.wanderSpeed = 0.15 + Math.random() * 0.35;
    this.wanderRadius = 20 + Math.random() * 60;
    this.wanderAngle = Math.random() * Math.PI * 2;
    this.wanderAngleSpeed = (Math.random() - 0.5) * 0.02;
    this.driftX = (Math.random() - 0.5) * 0.15;
    this.driftY = (Math.random() - 0.5) * 0.15;
    this.vx = 0;
    this.vy = 0;
    if (!initial) {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
    }
  }

  updateColor() {
    this.colorT += this.colorSpeed;
    if (this.colorT >= 1) {
      this.colorT = 0;
      this.colorState.from = this.colorState.to;
      this.colorState.to = palette[Math.floor(Math.random() * palette.length)];
    }
    const f = this.colorState.from;
    const t = this.colorState.to;
    return {
      r: lerp(f.r, t.r, this.colorT),
      g: lerp(f.g, t.g, this.colorT),
      b: lerp(f.b, t.b, this.colorT),
    };
  }

  update(time, idle) {
    this.twinklePhase += this.twinkleSpeed;
    const twinkle = (Math.sin(this.twinklePhase) + 1) / 2;
    this.size = this.baseSize * (0.5 + twinkle * 0.9);

    if (idle) {
      this.wanderAngle += this.wanderAngleSpeed;
      const targetX = this.x + Math.cos(this.wanderAngle) * 0.5 + this.driftX;
      const targetY = this.y + Math.sin(this.wanderAngle * 0.7) * 0.5 + this.driftY;
      this.x = targetX;
      this.y = targetY;

      if (this.x < -20) this.x = W + 20;
      if (this.x > W + 20) this.x = -20;
      if (this.y < -20) this.y = H + 20;
      if (this.y > H + 20) this.y = -20;
    } else {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;

      const desiredDist = this.wanderRadius + 40;
      const diff = dist - desiredDist;
      const force = diff * 0.0009;

      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;

      const orbitAngle = Math.atan2(dy, dx) + Math.PI / 2;
      this.vx += Math.cos(orbitAngle) * 0.02;
      this.vy += Math.sin(orbitAngle) * 0.02;

      this.vx *= 0.96;
      this.vy *= 0.96;

      this.x += this.vx;
      this.y += this.vy;
    }
  }

  draw() {
    const c = this.updateColor();
    const alpha = 0.55 + (Math.sin(this.twinklePhase) + 1) / 2 * 0.45;

    const glowSize = this.size * 5;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
    grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${alpha})`);
    grad.addColorStop(0.4, `rgba(${c.r},${c.g},${c.b},${alpha * 0.35})`);
    grad.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${Math.min(1, alpha + 0.3)})`;
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

const SPARKLE_COUNT = Math.min(220, Math.floor((W * H) / 7000));
let sparkles = [];
for (let i = 0; i < SPARKLE_COUNT; i++) sparkles.push(new Sparkle());

let heartActive = false;
let heartStartTime = 0;
const HEART_DURATION = 3200;

function heartPoint(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
  return { x, y };
}

class HeartSparkle {
  constructor(t, scale, cx, cy, delay) {
    const p = heartPoint(t);
    this.targetX = cx + p.x * scale;
    this.targetY = cy + p.y * scale;
    this.x = cx + (Math.random() - 0.5) * W;
    this.y = cy + (Math.random() - 0.5) * H;
    this.delay = delay;
    this.size = 1.5 + Math.random() * 2.5;
    this.colorPair = randomColorPair();
    this.colorT = Math.random();
    this.colorSpeed = 0.01 + Math.random() * 0.02;
    this.twinklePhase = Math.random() * Math.PI * 2;
  }

  updateColor() {
    this.colorT += this.colorSpeed;
    if (this.colorT >= 1) {
      this.colorT = 0;
      this.colorPair.from = this.colorPair.to;
      this.colorPair.to = palette[Math.floor(Math.random() * palette.length)];
    }
    const f = this.colorPair.from;
    const t = this.colorPair.to;
    return {
      r: lerp(f.r, t.r, this.colorT),
      g: lerp(f.g, t.g, this.colorT),
      b: lerp(f.b, t.b, this.colorT),
    };
  }

  update(elapsed) {
    const localT = Math.max(0, Math.min(1, (elapsed - this.delay) / 900));
    const eased = 1 - Math.pow(1 - localT, 3);
    this.x = lerp(this.x, this.targetX, eased * 0.18 + 0.02);
    this.y = lerp(this.y, this.targetY, eased * 0.18 + 0.02);
    this.twinklePhase += 0.08;
  }

  draw(pulse) {
    const c = this.updateColor();
    const twinkle = (Math.sin(this.twinklePhase) + 1) / 2;
    const alpha = 0.6 + twinkle * 0.4;
    const size = this.size * (0.8 + pulse * 0.6);

    const glowSize = size * 6;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
    grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${alpha})`);
    grad.addColorStop(0.4, `rgba(${c.r},${c.g},${c.b},${alpha * 0.4})`);
    grad.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${Math.min(1, alpha + 0.3)})`;
    ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
    ctx.fill();
  }
}

let heartSparkles = [];

function buildHeart() {
  heartSparkles = [];
  const cx = W / 2;
  const cy = H / 2 - 10;
  const scale = Math.min(W, H) / 38;
  const pointCount = 140;
  for (let i = 0; i < pointCount; i++) {
    const t = (i / pointCount) * Math.PI * 2;
    const delay = Math.random() * 500;
    heartSparkles.push(new HeartSparkle(t, scale, cx, cy, delay));
  }
}

document.getElementById('heartBtn').addEventListener('click', () => {
  buildHeart();
  heartActive = true;
  heartStartTime = performance.now();
});

function animate(time) {
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(8, 5, 14, 0.35)';
  ctx.fillRect(0, 0, W, H);

  const idle = !cursorTrackingEnabled || !mouse.active || (time - mouse.lastMove > IDLE_TIMEOUT);

  for (const s of sparkles) {
    s.update(time, idle);
    s.draw();
  }

  if (heartActive) {
    const elapsed = time - heartStartTime;
    const pulse = (Math.sin(elapsed * 0.006) + 1) / 2; 

    for (const hs of heartSparkles) {
      hs.update(elapsed);
      hs.draw(pulse);
    }

    if (elapsed > HEART_DURATION) {
      heartActive = false;
    }
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>

</body>
</html>
